<body>
  <!--navigations-->
  <nav>
    <div class="nav-bar" id="navigation">
      <a href="Home" class="active">Home</a>
      <a href="About">About</a>
      <a href="News">News</a>
      <a href="Contact">Contact</a>
      <a class="icon" onclick="burgerMenu()">
        <i class="fa fa-bars"></i>
      </a>
    </div>
  </nav>
  <!--javascript for burgermenu-->
  <script>
    function burgerMenu() {
      let burger = document.getElementById("navigation");
      if (x.className === "nav-bar") {
        x.className += " responsive";
      } else {
        x.className = "nav-bar";
      }
    }
  </script>
  <main>
    <h1 class="heading">This burger menu responsive Design</h1>
  </main>

</body>

</html>
